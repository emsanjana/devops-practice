---
- name: Create User, Install and Start Nginx
  hosts: all
  become: true

  vars:
    username: user1

  tasks:
    - name: Create User
      user:
        name: "{{username}}"
        state: present
        shell: /bin/bash

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Start Nginx
      service:
        name: nginx
        state: started
